name: Auto-bump formula

# Keep Formula/krill.rb in sync with the latest Krill release WITHOUT any
# personal access token. This workflow lives in the tap repo, so it writes to
# the tap with the built-in GITHUB_TOKEN (scoped to this repo) — nothing to
# create or store. It polls the (public) Krill releases on a schedule, and you
# can also trigger it instantly after cutting a release via "Run workflow".

on:
  schedule:
    - cron: "0 */6 * * *"   # safety net: check every 6 hours
  workflow_dispatch: {}      # instant manual bump right after a release

permissions:
  contents: write            # commit the bump to THIS repo — built-in token, no PAT

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump formula to latest Krill release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO=srvsngh99/Krill
          TAG=$(gh api "repos/$REPO/releases/latest" --jq .tag_name)   # e.g. v0.14.0
          VER="${TAG#v}"
          CUR=$(ruby -e 'puts(File.read("Formula/krill.rb")[/^\s*version\s+"([^"]+)"/, 1] || "")')
          echo "Latest release: $VER | formula currently: $CUR"
          if [ "$VER" = "$CUR" ]; then
            echo "Formula already at $VER — nothing to do."
            exit 0
          fi

          ASSET="krill-${VER}-arm64-apple-macos.tar.gz"
          URL="https://github.com/$REPO/releases/download/${TAG}/${ASSET}"
          echo "Downloading $URL"
          curl -fSL "$URL" -o "$ASSET"
          SHA=$(shasum -a 256 "$ASSET" | awk '{print $1}')

          # Ruby block-form sub! (the formula's own language): preserves indent
          # via $1, only the 3 target lines change, no GNU/BSD sed backref issues.
          NEW_URL="$URL" NEW_SHA="$SHA" NEW_VER="$VER" ruby -i -pe '
            $_.sub!(/^(\s*url\s+)".*"/)     { "#{$1}\"#{ENV["NEW_URL"]}\"" }
            $_.sub!(/^(\s*sha256\s+)".*"/)  { "#{$1}\"#{ENV["NEW_SHA"]}\"" }
            $_.sub!(/^(\s*version\s+)".*"/) { "#{$1}\"#{ENV["NEW_VER"]}\"" }
          ' Formula/krill.rb
          ruby -c Formula/krill.rb               # fail fast if the rewrite broke it
          echo "----- updated formula -----"
          grep -E '^\s*(url|sha256|version) ' Formula/krill.rb

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "krill ${VER}"
          git push
          echo "Bumped tap to krill ${VER}."
